spring:
  application:
    name: work-order-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5437/workorder_db}
    username: ${SPRING_DATASOURCE_USERNAME:workorder}
    password: ${SPRING_DATASOURCE_PASSWORD:workorder_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

# Inter-service URLs (overridden in k8s via ConfigMap)
services:
  technician-service:
    url: ${TECHNICIAN_SERVICE_URL:http://localhost:8081}
  audit-service:
    url: ${AUDIT_SERVICE_URL:http://localhost:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: work-order-service
    description: Manages work orders, assignments, and status transitions
    version: 0.0.1-SNAPSHOT

logging:
  level:
    com.globalfieldops.workorder: DEBUG
    org.springframework.security: INFO
