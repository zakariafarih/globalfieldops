spring:
  application:
    name: technician-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/technician_db}
    username: ${SPRING_DATASOURCE_USERNAME:technician}
    password: ${SPRING_DATASOURCE_PASSWORD:technician_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: technician-service
    description: Manages technician data and availability
    version: 0.0.1-SNAPSHOT

logging:
  level:
    com.globalfieldops.technician: DEBUG
    org.springframework.security: INFO
