# PostgreSQL instances for K8s local development
# NOT production-grade — single-replica, no persistent volume claims
# In production, use managed databases (e.g., Amazon RDS)

---
# ── Technician DB ────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: postgres-technician-secret
  namespace: globalfieldops
  labels:
    app: postgres-technician
    app.kubernetes.io/part-of: globalfieldops
type: Opaque
stringData:
  POSTGRES_DB: "technician_db"
  POSTGRES_USER: "technician"
  POSTGRES_PASSWORD: "technician_secret"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-technician
  namespace: globalfieldops
  labels:
    app: postgres-technician
    app.kubernetes.io/part-of: globalfieldops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-technician
  template:
    metadata:
      labels:
        app: postgres-technician
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-technician-secret
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "technician", "-d", "technician_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-technician
  namespace: globalfieldops
  labels:
    app: postgres-technician
    app.kubernetes.io/part-of: globalfieldops
spec:
  type: ClusterIP
  selector:
    app: postgres-technician
  ports:
    - port: 5432
      targetPort: 5432

